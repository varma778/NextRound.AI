<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="20" cy="20" r="19" stroke="url(#ring_grad)" stroke-width="2"/>
  <!-- Inner circle bg -->
  <circle cx="20" cy="20" r="15" fill="url(#bg_grad)"/>
  <!-- N letter -->
  <text x="8" y="27" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="white" letter-spacing="-1">NR</text>
  <defs>
    <linearGradient id="ring_grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CAC5FE"/>
      <stop offset="1" stop-color="#9b8ffc"/>
    </linearGradient>
    <linearGradient id="bg_grad" x1="5" y1="5" x2="35" y2="35" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171532"/>
      <stop offset="1" stop-color="#2a2660"/>
    </linearGradient>
  </defs>
</svg>
